name: scheduled-sample

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scheduled-sample
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run sampler
        env:
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
          NOTIFY_TARGET: ${{ secrets.NOTIFY_TARGET }}
          STORE_URL: ${{ secrets.STORE_URL }}
          STORE_TOKEN: ${{ secrets.STORE_TOKEN }}
          SOURCE_URL: ${{ secrets.SOURCE_URL }}
          SOURCE_PAGE: ${{ secrets.SOURCE_PAGE }}
          SOURCE_PICK_URL: ${{ secrets.SOURCE_PICK_URL }}
          SAMPLER_TZ: ${{ secrets.SAMPLER_TZ }}
        run: python tracker.py
